      <rect x="48" y="220" width="54" height="168" rx="24" fill="#8f520d"/>
      <rect x="308" y="220" width="54" height="168" rx="24" fill="#8f520d"/>
    </g>
    <g transform="translate(1040 420) rotate(-4)">
      <path d="M0 70 Q0 0 70 0 H230 Q300 0 300 70 V245 Q300 310 235 310 H65 Q0 310 0 245 Z" fill="#17130f" stroke="#d8b36a" stroke-width="6"/>
      <path d="M300 90 Q410 75 410 170 Q410 265 300 245" fill="none" stroke="#17130f" stroke-width="32"/>
      <path d="M300 100 Q380 94 380 170 Q380 238 300 232" fill="none" stroke="#d8b36a" stroke-width="8"/>
      <path d="M42 86 H256" stroke="#f1e6d4" stroke-width="6" opacity=".35"/>
      <path d="M60 155 C90 120 120 192 150 150 S210 120 240 162" fill="none" stroke="#c9914a" stroke-width="7"/>
    </g>
    <g transform="translate(740 650) rotate(2)">
