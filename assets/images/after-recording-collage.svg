      <path d="M0 44 H500 M0 88 H500 M0 132 H500 M0 176 H500" stroke="#8f520d" stroke-width="2" opacity=".35"/>
      <path d="M58 58 C130 34 170 80 240 52 S360 34 442 64" fill="none" stroke="#17130f" stroke-width="6"/>
      <path d="M58 108 C132 84 190 132 270 102 S380 82 444 112" fill="none" stroke="#17130f" stroke-width="6"/>
      <path d="M58 158 C126 142 196 182 268 154 S380 136 444 168" fill="none" stroke="#17130f" stroke-width="6"/>
