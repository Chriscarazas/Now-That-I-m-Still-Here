<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">After the recording collage</title>
  <desc id="desc">A vintage microphone, headphones, coffee cup, notebook, waveform, and torn paper arranged as a dark Victorian editorial collage.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#070808"/>
      <stop offset=".58" stop-color="#15110f"/>
      <stop offset="1" stop-color="#24180f"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#f1e6d4"/>
      <stop offset="1" stop-color="#d8c5a5"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#d8b36a"/>
      <stop offset=".35" stop-color="#4a4035"/>
      <stop offset=".68" stop-color="#c9914a"/>
      <stop offset="1" stop-color="#17191a"/>
    </linearGradient>
    <filter id="grain" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency=".85" numOctaves="3" seed="13" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="mono"/>
      <feComponentTransfer in="mono" result="fade"><feFuncA type="table" tableValues="0 .18"/></feComponentTransfer>
      <feBlend in="SourceGraphic" in2="fade" mode="multiply"/>
    </filter>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="18" dy="22" stdDeviation="18" flood-color="#000" flood-opacity=".55"/>
    </filter>
    <clipPath id="torn">
      <path d="M80 72 L148 58 222 76 298 56 370 74 452 53 532 71 620 48 702 68 790 52 866 75 948 56 1025 76 1110 52 1190 72 1280 51 1364 72 1450 58 1525 75 1536 905 1455 921 1372 902 1292 924 1205 903 1118 926 1034 902 948 925 862 906 780 928 692 904 610 926 526 906 442 928 356 905 272 925 190 903 110 920 68 900 Z"/>
    </clipPath>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <g opacity=".18" stroke="#d8b36a" fill="none">
    <path d="M0 172 C180 106 310 232 480 170 S820 112 1030 176 1390 224 1600 142"/>
    <path d="M0 810 C230 720 390 878 620 794 S1010 735 1210 820 1450 858 1600 790"/>
  </g>
  <g clip-path="url(#torn)" filter="url(#grain)">
    <rect x="66" y="50" width="1470" height="880" fill="url(#paper)" opacity=".96"/>
    <g opacity=".22" stroke="#5a402b" stroke-width="2">
      <path d="M120 220 H1480 M120 285 H1480 M120 350 H1480 M120 415 H1480 M120 480 H1480 M120 545 H1480 M120 610 H1480 M120 675 H1480 M120 740 H1480"/>
      <path d="M270 90 V900 M520 90 V900 M770 90 V900 M1020 90 V900 M1270 90 V900"/>
    </g>
    <g opacity=".16" fill="#6d3c20">
      <circle cx="250" cy="180" r="94"/><circle cx="1310" cy="760" r="130"/><circle cx="1110" cy="210" r="70"/>
    </g>
    <path d="M106 644 C240 610 300 680 416 642 S620 606 746 649 962 694 1110 640 1338 594 1502 651" fill="none" stroke="#9b4f18" stroke-width="7" opacity=".52"/>
    <g stroke="#17130f" stroke-width="8" fill="none" opacity=".88">
      <path d="M138 644 l28 -70 28 136 30 -98 32 60 30 -28 34 18 36 -83 32 126 34 -74 36 26 36 -13 30 -80 34 145 34 -94 34 32 38 -15 38 -86 34 153 38 -105 34 48 34 -18 34 -92 38 161 36 -108 38 47 34 -21 38 -82 36 141 38 -93 36 42 38 -17 34 -66 38 113 40 -72"/>
