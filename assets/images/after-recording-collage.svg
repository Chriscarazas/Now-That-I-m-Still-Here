      <rect x="92" y="48" width="176" height="270" rx="82" fill="url(#metal)" stroke="#17130f" stroke-width="10"/>
      <g stroke="#17130f" stroke-width="9">
        <path d="M122 95 H238 M112 135 H248 M106 175 H254 M106 215 H254 M118 255 H242"/>
