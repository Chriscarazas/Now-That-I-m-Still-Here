name: Link Checker

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Runs every Monday at 9:00 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  check-links:
    name: Check for Broken Links
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore lychee cache
        uses: actions/cache@v4
        with:
          path: .lycheecache
          key: cache-lychee-${{ github.sha }}
          restore-keys: cache-lychee-

      - name: Run lychee link checker
        id: lychee
        uses: lycheeverse/lychee-action@v1
        with:
          args: >
            --verbose
            --no-progress
            --cache
            --max-cache-age 1d
            --timeout 30
            --retry-wait-time 5
            --max-retries 3
            --exclude-loopback
            --exclude 'mailto:.*'
            --exclude 'tel:.*'
            --exclude 'https?://(www\.)?(twitter|x)\.com/.*'
            --exclude 'https?://(www\.)?linkedin\.com/.*'
            --exclude 'https?://(www\.)?facebook\.com/.*'
            --exclude 'https?://(www\.)?instagram\.com/.*'
            --exclude 'https?://(www\.)?threads\.com/.*'
            --exclude 'https?://bsky\.app/.*'
            './**/*.html'
          fail: true
          token: ${{ secrets.GITHUB_TOKEN }}
          output: lychee-report.md

      - name: Upload link check report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lychee-link-report
          path: lychee-report.md
          retention-days: 30

      - name: Create GitHub Issue for broken links
        if: failure() && github.event_name == 'schedule'
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: 'Weekly link check — broken links detected (${{ github.run_number }})'
          content-filepath: ./lychee-report.md
          labels: |
            bug
            broken-links
            automated
